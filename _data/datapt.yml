experiences:
    title: Experiências
    info:
      - role: Engenheiro de Software
        time: 2024 - Atualmente
        company: SAP, Híbrido
        details: |
          - Responsável pelo desenvolvimento em Java, integração com MSSQL, Kafka e transferências de dados entre bancos.
          - Gerenciamento de deploys Kubernetes, atualizações de pacotes e otimização de performance de APIs REST.
          - Participação ativa em grupos de qualidade e IA, promovendo inovação e melhores práticas.
          - Liderança no desenvolvimento de ferramentas de automação para otimizar fluxos de trabalho, incluindo projeto colaborativo cli.
          - Atuação em equipes Scrum, elaboração de testes unitários, de integração e performance.
      - role: Desenvolvedor Back-end
        time: 2021 - 2024
        company: Verzel Soluções em Sistemas, Remoto
        details: |
          - Desenvolvimento e manutenção de aplicações Java com Spring Boot para APIs REST e microsserviços escaláveis, aplicando princípios SOLID e Design Patterns.
          - Implementação de testes unitários e de integração, contribuição para monitoramento e observabilidade (Zipkin).
          - Trabalho com Apache Kafka, Kafka Streams, KSQL e Kafka Connect para processamento em tempo real e sincronização de dados.
          - Experiência com bancos relacionais (PostgreSQL, Oracle, MySQL, SQL Server) e NoSQL (MongoDB).
          - Participação em projetos Node.js com Express.js e Nest.js.
          - Colaboração em equipes ágeis (Scrum, Kanban).
          - Experiência com AWS (Lambda, S3, EKS, ECS, ECK, SQS, Cognito, Secrets Manager, CloudWatch, LightSail), CI/CD (Terraform, CloudFormation, GitHub Actions, Docker, Kubernetes) e Azure DevOps para aplicações Java.
      - role: SysAdmin
        time: 2014 - 2015
        company: Marinha do Brasil, Florianópolis - SC
        details: |
          - Gestão de operações de Data Center, incluindo criação e manutenção de servidores físicos e virtuais (VMware, XenServer, FreeNAS).
          - Administração de servidores de domínio, DNS, Samba 4 e aplicações web (Drupal CMS).
          - Rotinas de backup, monitoramento e gerenciamento de storages.
          - Ensino de Informática Básica para alunos da EAMSC.
          - Tecnologias: Bacula, Zabbix, Apache, PostgreSQL, MySQL, Shell Script, Oracle Linux, Ubuntu, Suse Linux.
      - role: Assistente da Divisão de Sistemas
        time: 2012 - 2014
        company: Marinha do Brasil, Niterói - RJ
        details: |
          - Gestão de operações de Data Center: criação e manutenção de servidores on-premises, virtualização, backup, configuração de domínio e DNS, monitoramento de servidores.
          - Tecnologias: VMware ESX, FreeNAS, DNS Server, Samba 4, Drupal CMS, Bacula, Zabbix, PostgreSQL, MySQL, Shell Script, Suse Linux, Ubuntu.
      - role: Support Analyst I
        time: 2012 - 2012
        company: Santa Casa, Juiz de Fora - MG
        details: |
          - Suporte a sistemas de faturamento de clientes de planos de saúde, elaboração de requisições no Banco de Dados Oracle (PL/SQL).
          - Atendimento técnico aos usuários e manutenção de computadores.
          - Tecnologias: PL/SQL, SQL, Banco de dados, Manutenção de computadores.
