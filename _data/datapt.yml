experiences:
    title: Experiências
    info:
      - role: Engenheiro de Software
        time: Out 2024 - Atualmente
        company: SAP, São Leopoldo, RS (Híbrido)
        details: |
          - Deploy de Kafka e Kubernetes em escala, otimização de latência em APIs REST.
          - Monitoramento de sistemas com Dynatrace, Grafana e Sumo Logic; resposta a incidentes.
          - Contribuição aos grupos de trabalho de Qualidade e IA.
          - Desenvolvimento de uma ferramenta CLI interna com agentes de IA para fluxos de desenvolvimento e análise de tickets. Integrei Claude, Cline e GitHub Copilot via servidores MCP.
          - Atuação em equipes Scrum com práticas de Continuous Delivery; testes unitários, integração e performance.
          - Campeão do SAP InnoWeeks 2025 (Melhor Implementação de IA, Campeão Geral).
      - role: Desenvolvedor Back-end
        time: Out 2021 - Out 2024
        company: Verzel Soluções em Sistemas, Remoto
        details: |
          - Desenvolvimento de microsserviços em Java com Spring Boot; testes unitários e de integração.
          - Configuração de monitoramento com Zipkin para observabilidade.
          - Trabalho com Kafka, Kafka Streams, KSQL e Kafka Connect para processamento em tempo real.
          - Uso de PostgreSQL, Oracle, MySQL e MongoDB conforme necessário.
          - Contribuição em projetos Node.js (Express.js, Nest.js).
          - Trabalho em equipes Scrum e Kanban.
          - AWS: EC2, Lambda, S3, EKS, SQS, Cognito, CloudWatch. CI/CD: Terraform, GitHub Actions, Docker, Kubernetes. Também utilizei Azure DevOps.
      - role: SysAdmin
        time: Ago 2018 - Ago 2021
        company: Marinha do Brasil, Florianópolis, SC
        details: |
          - Gestão de infraestrutura de data center: servidores físicos e virtuais (VMware, XenServer, FreeNAS), backups, DNS e Samba 4.
          - Administração de Drupal CMS e aplicações web.
          - Configuração de monitoramento e gerenciamento de storage com Bacula, Zabbix.
          - Ensino de Informática Básica para alunos da EAMSC.
          - Tech: Apache, PostgreSQL, MySQL, Shell Script, Oracle Linux, Ubuntu, Suse Linux.
      - role: Assistente da Divisão de Sistemas
        time: Dez 2012 - Jan 2018
        company: Marinha do Brasil, Niterói, RJ
        details: |
          - Construção e manutenção de infraestrutura on-premises: servidores, virtualização, backups, DNS e Samba 4.
          - Gerenciamento de Drupal CMS e monitoramento de servidores.
          - Tech: VMware ESX, FreeNAS, Bacula, Zabbix, PostgreSQL, MySQL, Shell Script, Suse Linux, Ubuntu.
      - role: Analista de Suporte I
        time: Fev 2012 - Jul 2012
        company: Santa Casa de Juiz de Fora, MG
        details: |
          - Suporte a sistemas de faturamento de planos de saúde, elaboração de requisições no Oracle Database (PL/SQL).
          - Atendimento técnico aos usuários e manutenção de computadores.

