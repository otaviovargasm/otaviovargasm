career-profile:
    title: Sobre mim
    summary: |
      Engenheiro de Software com mais de 14 anos de experiência em TI, desenvolvendo
      sistemas backend, arquitetura distribuída e infraestrutura em cloud. Na SAP,
      trabalho com Java, Kafka, Kubernetes e otimização de APIs. Também desenvolvo
      ferramentas com agentes de IA e integração de LLMs em escala empresarial.

      Ganhei a competição SAP InnoWeeks 2025 com meu time, levando quatro prêmios
      incluindo Melhor Implementação de IA e Campeão Geral.

      Stack: Java, Spring Boot, Apache Kafka, Kubernetes, AWS (Lambda, S3, EKS,
      SQS, Cognito, CloudWatch), Docker, Terraform, PostgreSQL, MongoDB, Node.js
      e TypeScript.

      Buscando oportunidades como Engenheiro de Software Sênior para trabalhar com
      sistemas backend e infraestrutura cloud.

