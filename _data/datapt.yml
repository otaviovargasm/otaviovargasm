career-profile:
    title: Sobre mim
    summary: |
      Com histórico comprovado de entrega de soluções robustas e escaláveis, destaco-me por transformar ideias complexas em resultados de alto impacto através do código. Ao longo de mais de 15 anos em tecnologia, liderei e contribuí para projetos de grande relevância, promovendo excelência técnica e colaboração entre equipes. Minha expertise abrange Engenharia de Software, Desenvolvimento Back-end, Cloud e DevOps, com profundo conhecimento em Java, Spring Boot, Node.js, TypeScript, JavaScript, AWS, Docker e bancos de dados. Sou reconhecido pela capacidade de resolver desafios complexos, mentorar colegas e implementar as melhores práticas em ambientes ágeis. Graduado em Sistemas de Informação pela UFF, com pós-graduação em Desenvolvimento Orientado a Objetos em Java. Sempre aberto a novos desafios e oportunidades para gerar valor e inovação.
