career-profile:
    title: About Me
    summary: |
      Software Engineer with 14+ years of IT experience, specializing in
      Back-end Development, Cloud, and DevOps. Currently at SAP in São Leopoldo,
      Brazil, building high-performance Java applications with Kafka integration,
      Kubernetes deployments, and REST API optimization at enterprise scale.

      Champion of SAP InnoWeeks 2025 — won 4 awards (Best Design, Best AI
      Implementation, Best Project Strategy, and Overall Winner) with a
      cross-functional team.

      Core stack: Java, Spring Boot, Apache Kafka, Kubernetes, AWS (Lambda, S3,
      EKS, SQS, Cognito, CloudWatch), Docker, Terraform, PostgreSQL, MongoDB,
      Node.js, TypeScript. Recognized for solving complex problems, mentoring
      peers, and driving technical excellence in agile environments.

      Currently seeking Senior Software Engineer opportunities where I can apply
      my cloud-native and back-end expertise at scale.

