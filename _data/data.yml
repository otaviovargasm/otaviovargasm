    info:
      - role: Software Engineer
        time: Oct 2024 - Present
        company: SAP, São Leopoldo, RS — Hybrid
        details: |
          - Java development with MSSQL integration, Kafka, and real-time database-to-database data transfers.
          - Manage Kubernetes deployments, perform package updates, and optimize REST API performance at SAP scale.
          - Active member of Quality Assurance and AI Working Groups, driving innovation and engineering best practices.
          - Lead development of internal automation tools (collaborative CLI project), improving team workflow efficiency.
