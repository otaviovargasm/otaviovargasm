education:
    title: About me
    summary: |
      With a proven track record of delivering robust and scalable solutions, I excel at transforming complex ideas into impactful results through code. Over more than 15 years in technology, I have led and contributed to high-impact projects, driving technical excellence and fostering collaboration across teams. My expertise spans Software Engineering, Back-end Development, Cloud, and DevOps, with deep knowledge in Java, Spring Boot, Node.js, TypeScript, JavaScript, AWS, Docker, and databases. I am recognized for my ability to solve challenging problems, mentor peers, and implement best practices in agile environments. Graduated in Information Systems from UFF, with a postgraduate degree in Object-Oriented Development in Java. Always open to new challenges and opportunities to create value and innovation.
