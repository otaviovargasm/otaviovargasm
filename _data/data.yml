        company: Marinha do Brasil (Brazil's Navy), Niterói, RJ
        details: |
          - Managed Data Center operations: server creation and maintenance (on-premises), virtualization, backup, domain and DNS setup, and server monitoring.
          - Technologies: VMware ESX, FreeNAS, DNS Server, Samba 4, Drupal CMS, Bacula, Zabbix, PostgreSQL, MySQL, Shell Script, Suse Linux, Ubuntu.
