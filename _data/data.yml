career-profile:
    title: About Me
    summary: |
      Software Engineer with 14+ years of IT experience in backend systems,
      distributed architecture, and cloud infrastructure. At SAP, I build Java
      applications using Kafka, Kubernetes, and REST APIs. I also work on AI agent
      tooling and LLM integration at enterprise scale.

      I won the SAP InnoWeeks 2025 competition with my team, taking home four
      awards including Best AI Implementation and Overall Champion.

      Stack: Java, Spring Boot, Apache Kafka, Kubernetes, AWS (Lambda, S3, EKS,
      SQS, Cognito, CloudWatch), Docker, Terraform, PostgreSQL, MongoDB, Node.js,
      TypeScript.

      Looking for Senior Software Engineer roles where I can contribute to backend
      and cloud infrastructure work.

